name: SDR Agent Hunter 24/7 (Live Production)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests nevermined-sdk-py

      - name: Run LIVE A2A Outreach & x402 Billing
        env:
          NEVERMINED_API_KEY: ${{ secrets.NEVERMINED_API_KEY }}
        run: |
          python scripts/a2a_outreach.py "Nossos agentes operam no Nivel Diamante com zero risco de alucinacao. Aceita abrir canal x402 USDC?"
